# casket credential-leak rules.
# Each rule scans file *contents* inside image layers for high-confidence
# secret patterns. Kept deliberately small and high-signal for v0.1 — this is
# tombstone-style pattern matching, not an exhaustive secrets engine.
#
# Fields:
#   id:       stable rule identifier (snake_case)
#   title:    human-readable finding title
#   severity: critical | high | medium | low | info
#   regex:    Python regex; if it matches file content, a finding is emitted
rules:
  - id: aws_secret_access_key
    title: "AWS secret access key"
    severity: critical
    regex: "(?i)aws_secret_access_key\\s*[=:]\\s*['\"]?[A-Za-z0-9/+=]{40}"

  - id: aws_access_key_id
    title: "AWS access key id"
    severity: high
    regex: "AKIA[0-9A-Z]{16}"

  - id: generic_api_token
    title: "Generic API token / secret in env or config"
    severity: high
    regex: "(?i)(api[_-]?token|api[_-]?key|secret[_-]?token)\\s*[=:]\\s*['\"]?[A-Za-z0-9_\\-]{16,}"

  - id: private_key_block
    title: "Private key material"
    severity: critical
    regex: "-----BEGIN (RSA |EC |OPENSSH |DSA |PGP )?PRIVATE KEY-----"

  # ---------------------------------------------------------------------------
  # Expanded high-precision provider token patterns (POST_V01 Item 6).
  # Each pattern has a structural prefix and/or fixed length that keeps the
  # false-positive rate negligible — no entropy analysis required. These cover
  # the real-world tokens teams accidentally bake into images.
  # ---------------------------------------------------------------------------

  - id: github_pat
    title: "GitHub personal access token"
    severity: high
    regex: "ghp_[A-Za-z0-9]{36}"

  - id: github_oauth
    title: "GitHub OAuth access token"
    severity: high
    regex: "gho_[A-Za-z0-9]{36}"

  - id: github_actions_token
    title: "GitHub Actions / app token"
    severity: high
    regex: "gh[su]_[A-Za-z0-9]{36}"

  - id: slack_token
    title: "Slack API token"
    severity: high
    regex: "xox[baprs]-[0-9A-Za-z-]{10,}"

  - id: stripe_secret_key
    title: "Stripe live secret key"
    severity: critical
    regex: "sk_live_[0-9a-zA-Z]{24,}"

  - id: stripe_restricted_key
    title: "Stripe live restricted key"
    severity: high
    regex: "rk_live_[0-9a-zA-Z]{24,}"

  - id: gcp_service_account_key
    title: "GCP service-account key (JSON)"
    severity: critical
    regex: "\"type\"\\s*:\\s*\"service_account\""

  - id: sendgrid_api_key
    title: "SendGrid API key"
    severity: high
    regex: "SG\\.[A-Za-z0-9_\\-]{22}\\.[A-Za-z0-9_\\-]{43}"

  - id: npm_token
    title: "npm automation token"
    severity: high
    regex: "npm_[A-Za-z0-9]{36}"

  - id: docker_hub_pat
    title: "Docker Hub personal access token"
    severity: high
    regex: "dckr_pat_[A-Za-z0-9_\\-]{27}"

  - id: jwt_token
    title: "JSON Web Token (header.payload.signature)"
    severity: medium
    regex: "eyJ[A-Za-z0-9_\\-]+\\.eyJ[A-Za-z0-9_\\-]+\\.[A-Za-z0-9_\\-]+"

  - id: heroku_api_key
    title: "Heroku API key"
    severity: high
    # Context-guarded: a UUID alone is too noisy, so require a heroku-ish key
    # assignment before the UUID to keep precision high.
    regex: "(?i)heroku[a-z0-9_\\-]*\\s*[=:]\\s*['\"]?[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}"

  - id: mailchimp_api_key
    title: "Mailchimp API key"
    severity: high
    regex: "[0-9a-f]{32}-us[0-9]{1,2}"

  - id: twilio_account_sid
    title: "Twilio account SID"
    severity: medium
    regex: "AC[0-9a-f]{32}"

  - id: twilio_api_key_sid
    title: "Twilio API key SID"
    severity: medium
    regex: "SK[0-9a-f]{32}"

  # ---------------------------------------------------------------------------
  # Cloud / AI provider patterns (POST_V01 extended — Rotation 37).
  # Azure Storage Account keys, OpenAI / Anthropic API keys, Databricks PATs,
  # and HashiCorp Vault service tokens are all structurally unambiguous when
  # matched in context and represent critical secret classes commonly baked
  # into container images via environment files, config blobs, or model code.
  # ---------------------------------------------------------------------------

  - id: azure_storage_key
    title: "Azure Storage Account key"
    severity: critical
    # Azure storage account keys are 88-character base64 strings ending with
    # "==" and almost always appear next to a key-assignment keyword.
    # Context-guard ("AccountKey=") keeps false-positive rate negligible.
    regex: "AccountKey=[A-Za-z0-9+/]{86}=="

  - id: openai_api_key
    title: "OpenAI API key"
    severity: critical
    # Classic "sk-" keys (51 chars after prefix) and newer project-scoped
    # "sk-proj-" keys (both formats that OpenAI has issued).
    regex: "sk-(?:proj-)?[A-Za-z0-9]{20}T3BlbkFJ[A-Za-z0-9]{20}|sk-proj-[A-Za-z0-9_\\-]{100,}"

  - id: anthropic_api_key
    title: "Anthropic API key"
    severity: critical
    # Anthropic API keys begin with "sk-ant-" followed by api-/admin- prefixed
    # base64url segments separated by underscores.
    regex: "sk-ant-(?:api|admin)[0-9]*-[A-Za-z0-9_\\-]{80,}"

  - id: databricks_token
    title: "Databricks personal access token"
    severity: high
    # Databricks PATs begin with "dapi" and consist of 32 lowercase hex chars.
    regex: "dapi[a-f0-9]{32}"

  - id: hashicorp_vault_token
    title: "HashiCorp Vault / HCP service token"
    severity: critical
    # HCP Vault service tokens: hvs.* (service) or hvb.* (batch).
    # Require a minimum of 24 chars after the prefix to avoid matching short
    # test/placeholder strings.
    regex: "hv[sb]\\.[A-Za-z0-9_\\-]{24,}"

  - id: high_entropy_string
    title: "High-entropy string (possible secret/token)"
    severity: medium
    kind: entropy
    # Runtime parameters for the entropy scanner (not a regex rule).
    # The creds check dispatches on kind: entropy instead of compiling these.
    entropy_threshold: 4.5
    entropy_threshold_log: 4.0   # lower threshold when path contains "log" / ends in .log
    min_length: 20
    charset: "ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789+/="
    finding_id: "CASKET-CREDS-ENTROPY-001"
